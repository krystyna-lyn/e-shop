<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Commerce Web</title>
    <link
      rel="stylesheet"
      href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section id="header"></section>

    <section id="product-details" class="section-p1">
      <div class="single-img">
        <img src="img/pr1.jpg" width="100%" id="mainImg" />

        <div class="img-group">
          <div class="img-col">
            <img src="img/pr1.jpg" alt="" width="100%" class="small-img" />
          </div>
          <div class="img-col">
            <img src="img/pr2.jpg" alt="" width="100%" class="small-img" />
          </div>
          <div class="img-col">
            <img src="img/pr3.jpg" alt="" width="100%" class="small-img" />
          </div>
          <div class="img-col">
            <img src="img/pr4.jpg" alt="" width="100%" class="small-img" />
          </div>
        </div>
      </div>

      <div class="single-details">
        <p class="product-category">Women's Fashion T-Shirt</p>
        <h2 id="productName"></h2>
        <p class="product-price" id="productPrice"></p>

        <div class="product-options">
          <label for="productSize">Size</label>
          <select id="productSize">
            <option>Select size</option>
            <option>XSmall</option>
            <option>Small</option>
            <option>Medium</option>
            <option>Large</option>
          </select>
        </div>

        <div class="product-actions">
          <div class="qty-control">
            <label for="productQty">Quantity</label>
            <input type="number" id="productQty" value="1" min="1" max="99" />
          </div>
          <button class="btn addToCartDetail" id="addToCartBtn" type="button">
            Add to Cart
          </button>
        </div>

        <h4>Product Details</h4>
        <span id="pDescription"></span>
      </div>
    </section>

    <section id="product1" class="section-p1">
      <h2>New Arrivals</h2>
      <p>Summer Collection New Modern Design</p>

      <div class="pro-container">
       
      </div>
      
    </section>

    <section id="newsletter" class="section-p1 section-m1">
      <div class="newstext">
        <h4>Sign Up For Newsletter</h4>
        <p>
          Get E-Mail updates about our latest shop and
          <span>special offers.</span>
        </p>
      </div>
      <div class="form">
        <input type="text" placeholder="Your email address" />
        <button class="btn normal">Sign in</button>
      </div>
    </section>

    <footer class="section-p1" id="footer"></footer>

    <script src="js/data.js"></script>
    <script>
      const mainImg = document.getElementById("mainImg");
      const smallImg = document.getElementsByClassName("small-img");

      smallImg[0].onclick = function () {
        mainImg.src = smallImg[0].src;
      };
      smallImg[1].onclick = function () {
        mainImg.src = smallImg[1].src;
      };
      smallImg[2].onclick = function () {
        mainImg.src = smallImg[2].src;
      };
      smallImg[3].onclick = function () {
        mainImg.src = smallImg[3].src;
      };

      function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
      }

      document.addEventListener("DOMContentLoaded", () => {
        const productId = getQueryParam("id");
        const addBtn = document.getElementById("addToCartBtn");

        if (productId) {
          const product = tshirts.find((item) => item.id == productId);

          if (product) {
            document.getElementById("mainImg").src = product.image;
            document.getElementById("productName").textContent = product.productName;
            document.getElementById("productPrice").textContent = "€" + product.productPrice;
            document.getElementById("pDescription").textContent = product.description;

            if (addBtn) {
              addBtn.dataset.productId = product.id;
              addBtn.dataset.productName = product.productName;
              addBtn.dataset.productPrice = product.productPrice;
              addBtn.dataset.productImage = product.image;
            }
          }
        }
      });
    </script>
    <script src="js/essentials.js"></script>
    <script src="js/products.js"></script>
    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
  </body>
</html>
