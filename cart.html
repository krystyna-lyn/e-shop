<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart — Kryslyn</title>
    <link
      rel="stylesheet"
      href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section id="header"></section>

    <section id="page-header" class="cart-page-header">
      <h4>Shopping Cart</h4>
      <p>Review your items and proceed to checkout</p>
    </section>

    <section id="cart" class="section-p1">
      <div class="cart-page-toolbar">
        <h2>Your items</h2>
        <button class="btn deleteAll hidden" type="button">Clear cart</button>
      </div>

      <div class="cart-table-wrap">
        <table class="cart-table">
          <thead>
            <tr>
              <td></td>
              <td>Product</td>
              <td>Price</td>
              <td>Quantity</td>
              <td>Subtotal</td>
            </tr>
          </thead>
          <tbody id="products"></tbody>
        </table>
      </div>

      <div class="cart-empty-page hidden" id="cart-empty-page">
        <i class="far fa-shopping-bag"></i>
        <h3>Your cart is empty</h3>
        <p>Add products from the shop to get started.</p>
        <a href="shop.html" class="btn">Continue shopping</a>
      </div>
    </section>

    <section id="cart-add" class="section-p1">
      <div id="coupon">
        <h3>Apply coupon</h3>
        <div class="coupon-row">
          <input type="text" placeholder="Enter your coupon code" />
          <button class="btn" type="button">Apply</button>
        </div>
      </div>
      <div id="subtotal">
        <h3>Order summary</h3>
        <table>
          <tr>
            <td>Subtotal</td>
            <td class="totalPrice">€0</td>
          </tr>
          <tr>
            <td>Shipping</td>
            <td>Free</td>
          </tr>
          <tr class="total-row">
            <td><strong>Total</strong></td>
            <td><strong class="totalPrice">€0</strong></td>
          </tr>
        </table>
        <button class="btn checkout-page-btn" type="button">Proceed to checkout</button>
      </div>
    </section>

    <footer id="footer" class="section-p1"></footer>

    <script src="js/data.js"></script>
    <script src="js/essentials.js"></script>
    <script src="js/script.js"></script>
    <script src="js/cart-page.js"></script>
  </body>
</html>
